<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neon Beat - Music Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom utilities based on style guidance */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bloom-primary {
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.4);
        }
        .bloom-tertiary {
            box-shadow: 0 0 20px rgba(0, 218, 243, 0.6);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container": "#201f1f",
                        "on-primary-container": "#ffffff",
                        "on-secondary-fixed-variant": "#8f0041",
                        "on-surface-variant": "#d4c0d7",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#00daf3",
                        "outline": "#9d8ba0",
                        "on-secondary-container": "#590026",
                        "surface-container-highest": "#353534",
                        "on-surface": "#e5e2e1",
                        "error": "#ffb4ab",
                        "on-primary": "#520072",
                        "inverse-primary": "#9800d0",
                        "secondary-fixed-dim": "#ffb1c3",
                        "primary-fixed-dim": "#ebb2ff",
                        "surface-tint": "#ebb2ff",
                        "primary-fixed": "#f8d8ff",
                        "error-container": "#93000a",
                        "inverse-on-surface": "#313030",
                        "on-tertiary-fixed": "#001f24",
                        "surface-container-low": "#1c1b1b",
                        "surface": "#131313",
                        "surface-dim": "#131313",
                        "secondary-container": "#ff4b89",
                        "on-background": "#e5e2e1",
                        "primary-container": "#bc13fe",
                        "on-tertiary-container": "#ffffff",
                        "on-error": "#690005",
                        "on-primary-fixed-variant": "#74009f",
                        "tertiary-fixed-dim": "#00daf3",
                        "surface-bright": "#3a3939",
                        "surface-variant": "#353534",
                        "on-secondary": "#66002c",
                        "background": "#131313",
                        "on-primary-fixed": "#320047",
                        "primary": "#ebb2ff",
                        "surface-container-high": "#2a2a2a",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-fixed": "#9cf0ff",
                        "secondary": "#ffb1c3",
                        "on-secondary-fixed": "#3f0019",
                        "tertiary-container": "#008392",
                        "outline-variant": "#504254",
                        "secondary-fixed": "#ffd9e0",
                        "on-tertiary-fixed-variant": "#004f58",
                        "on-tertiary": "#00363d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "xl": "80px",
                        "base": "8px",
                        "sm": "12px",
                        "margin": "32px",
                        "gutter": "20px",
                        "md": "24px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "label-bold": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body-md antialiased selection:bg-primary-container selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-black/5 dark:bg-black/5 backdrop-blur-lg border-b border-white/10 shadow-[0_4_20px_rgba(0,0,0,0.5)]">
<button class="text-white/70 hover:text-white hover:bg-white/10 transition-all duration-300 active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="font-['Space_Grotesk'] font-bold tracking-tighter text-2xl font-black text-[#BC13FE] drop-shadow-[0_0_8px_rgba(188,19,254,0.8)]">
            NEON_BEAT
        </div>
<button class="text-white/70 hover:text-white hover:bg-white/10 transition-all duration-300 active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up portrait of a youthful individual in a vibrant, neon-lit environment, reflecting the neon-noir style with striking pink and blue lighting illuminating their features against a dark, moody background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6elu_KRfDoqVzkeeJafdlH8Exvdpk85efqruJOMAJeoLKyg0sBeXqRFltn01DzDK4qW8CAvYErBDnk6kTfDGloIfstrdaeCdP8CRHKejRrjEZ8v1Vc9kcpCKS52C7vwr8uQTYS7eGCjhsVmCbaoJvgEaHC9OnZa_fxSEIpmR9Cmu9Suwx4f_lOiwcBDBVO3M4BkoqlOhsvF4uErkjp-nEgctnKdIMo4-9ZaU81NECsy7Va7XZ8jbPhmdg3akngMnmCbQZTyC1TRsi"/>
</div>
</button>
<!-- Desktop Nav Cluster (Hidden on mobile) -->
<nav class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 items-center gap-8">
<a class="text-white/70 hover:text-white transition-colors font-['Space_Grotesk'] font-bold tracking-widest text-sm uppercase" href="#">Library</a>
<a class="text-white/70 hover:text-white transition-colors font-['Space_Grotesk'] font-bold tracking-widest text-sm uppercase" href="#">Explore</a>
<a class="text-[#BC13FE] drop-shadow-[0_0_12px_rgba(188,19,254,1)] font-['Space_Grotesk'] font-bold tracking-widest text-sm uppercase" href="#">Player</a>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="pt-[80px] pb-[100px] min-h-screen flex flex-col items-center justify-center px-4 relative overflow-hidden">
<!-- Ambient Background Glows -->
<div class="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[30vw] h-[30vw] bg-tertiary/10 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Player Container (Glassmorphism) -->
<div class="w-full max-w-md glass-panel rounded-3xl p-6 sm:p-8 flex flex-col items-center relative z-10 bloom-primary">
<!-- Album Art -->
<div class="w-full aspect-square rounded-2xl overflow-hidden mb-8 relative group shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/10">
<img alt="Album Cover" class="w-full h-full object-cover" data-alt="Abstract, high-energy album cover art featuring swirling, luminescent neon colors of electric blue and hot pink against a pitch-black void. The digital artwork resembles a futuristic cityscape distorted by high speeds, fitting perfectly within a cyberpunk or neon-noir aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpK_TOtAMlBpRUuO8m6DPOh9MaxzI9LTBLISOJx0eiNuSnzxMdn9IBheUdKqMgGRcygtOSoz1GogFq-PyGLIefvfUcALPVavj_5jsFNDnZ03_0LP1Vr1osfLRHNCeIi6ge6TQjeIMS0upKn5XUe1i2RypI5rtqRRK0S0lHW0nNNj5pwlp4DzMJTnUXFEhU2pkpmCbrMJ77j6LfrHWLT7v_58dN_rCb8nw3srcz9Qs-4BQUTLdbD08wG5ZCf5PyTWaJyKNb0Cbz2JTe"/>
<!-- Inner glow overlay -->
<div class="absolute inset-0 shadow-[inset_0_0_40px_rgba(0,0,0,0.8)] pointer-events-none"></div>
</div>
<!-- Track Info -->
<div class="text-center mb-8 w-full">
<h1 class="font-headline-lg text-headline-lg text-primary-fixed mb-2 truncate drop-shadow-[0_0_10px_rgba(235,178,255,0.5)]">CYBER SYNTH</h1>
<h2 class="font-body-lg text-body-lg text-tertiary-fixed-dim">Midnight Skyline</h2>
</div>
<!-- Dynamic Visualizer (Simulated) -->
<div class="flex items-end justify-center gap-1.5 h-12 mb-8 w-full px-4">
<div class="w-2 bg-tertiary rounded-full h-[30%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[70%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[40%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[90%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[50%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[80%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[20%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[60%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[100%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[45%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[75%] bloom-tertiary"></div>
<div class="w-2 bg-tertiary rounded-full h-[35%] bloom-tertiary"></div>
</div>
<!-- Progress Bar -->
<div class="w-full mb-10 flex flex-col gap-2">
<div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-visible relative flex items-center">
<div class="h-full bg-tertiary rounded-full w-[65%] shadow-[0_0_15px_rgba(0,218,243,0.8)] relative">
<!-- Thumb -->
<div class="absolute right-0 top-1/2 transform -translate-y-1/2 translate-x-1/2 w-4 h-4 bg-white rounded-full shadow-[0_0_10px_rgba(255,255,255,1),0_0_20px_rgba(0,218,243,1)]"></div>
</div>
</div>
<div class="flex justify-between w-full font-label-bold text-label-bold text-outline">
<span>2:14</span>
<span>3:45</span>
</div>
</div>
<!-- Playback Controls -->
<div class="flex items-center justify-center gap-8 w-full">
<button class="text-on-surface-variant hover:text-white transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" style="font-size: 32px;">skip_previous</span>
</button>
<button class="bg-primary-container text-white w-20 h-20 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(188,19,254,0.6)] hover:shadow-[0_0_50px_rgba(188,19,254,0.9)] transition-all active:scale-95 border border-primary-fixed-dim/30">
<span class="material-symbols-outlined" style="font-size: 40px; font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface-variant hover:text-white transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" style="font-size: 32px;">skip_next</span>
</button>
</div>
<!-- Secondary Controls -->
<div class="flex items-center justify-between w-full mt-8 px-4 text-outline-variant">
<button class="hover:text-tertiary transition-colors"><span class="material-symbols-outlined">shuffle</span></button>
<button class="hover:text-secondary-container transition-colors"><span class="material-symbols-outlined">favorite</span></button>
<button class="hover:text-tertiary transition-colors"><span class="material-symbols-outlined">repeat</span></button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-black/10 dark:bg-black/10 backdrop-blur-2xl border-t border-white/10 rounded-t-2xl shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
<a class="flex flex-col items-center justify-center text-white/40 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">library_music</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest font-bold">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-white/40 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">explore</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest font-bold">Explore</span>
</a>
<!-- Active State: Player -->
<a class="flex flex-col items-center justify-center text-[#BC13FE] drop-shadow-[0_0_12px_rgba(188,19,254,1)] scale-110 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest font-bold">Player</span>
</a>
</nav>
</body></html>
